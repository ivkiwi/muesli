name: Build macOS Beta App

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the beta artifact (for example 0.3.0-beta.1)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "This workflow only publishes beta builds. Official tagged releases must use scripts/release.sh." >&2
            exit 1
          fi

          VERSION="${{ github.event.inputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION="0.0.0-beta.${GITHUB_RUN_NUMBER}"
          fi
          BUNDLE_VERSION="${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          SAFE_VERSION="${VERSION//[^A-Za-z0-9._-]/-}"
          TAG_NAME="beta-${SAFE_VERSION}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          RELEASE_TITLE="Guesli Beta ${VERSION}"
          PRERELEASE="true"
          RELEASE_NOTES=$'Russian-focused Guesli build: Muesli fork with telemetry removed and Google Meet speaker bridge included.\n\nThis build is ad-hoc signed with local-only entitlements and is unnotarized. Testers should move the app to /Applications and may need to use System Settings > Privacy & Security > Open Anyway on first launch.'
          ASSET_SUFFIX="-adhoc-unnotarized"

          APP_DIR="dist/Guesli.app"
          APP_ZIP="dist/Guesli-${SAFE_VERSION}${ASSET_SUFFIX}.zip"
          DMG_PATH="dist/Guesli-${SAFE_VERSION}${ASSET_SUFFIX}.dmg"
          EXTENSION_ZIP="dist/Guesli-Meet-Speaker-Bridge-${SAFE_VERSION}.zip"

          {
            echo "version=$VERSION"
            echo "bundle_version=$BUNDLE_VERSION"
            echo "tag_name=$TAG_NAME"
            echo "release_title=$RELEASE_TITLE"
            echo "prerelease=$PRERELEASE"
            echo "app_dir=$APP_DIR"
            echo "app_zip=$APP_ZIP"
            echo "dmg_path=$DMG_PATH"
            echo "extension_zip=$EXTENSION_ZIP"
            echo "release_notes<<EOF"
            echo "$RELEASE_NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check browser extension
        run: |
          node --check browser-extension/muesli-meet-speaker/content.js
          node --test browser-extension/muesli-meet-speaker/content.test.js

      - name: Run Meet speaker tests
        run: |
          if [[ -f native/MuesliNative/Tests/MuesliTests/MeetSpeakerBridgeTests.swift ]]; then
            swift test --package-path native/MuesliNative --scratch-path "$RUNNER_TEMP/muesli-spm" --filter MeetSpeakerBridgeTests
          else
            echo "Meet speaker bridge tests are not present on this ref; skipping focused test step."
          fi

      - name: Build app bundle
        env:
          MUESLI_INSTALL_DIR: ${{ github.workspace }}/dist
          MUESLI_BUILD_VERSION: ${{ steps.meta.outputs.version }}
          MUESLI_BUNDLE_VERSION: ${{ steps.meta.outputs.bundle_version }}
          MUESLI_SHORT_VERSION: ${{ steps.meta.outputs.version }}
          MUESLI_APP_NAME: Guesli
          MUESLI_DISPLAY_NAME: Guesli
          MUESLI_APP_BUNDLE_NAME: Guesli.app
          MUESLI_EXECUTABLE_NAME: Guesli
          MUESLI_SUPPORT_DIR_NAME: Guesli
          MUESLI_BUNDLE_ID: com.ivkiwi.guesli
          MUESLI_SPARKLE_FEED_URL: ""
          MUESLI_ENTITLEMENTS: ${{ github.workspace }}/scripts/MuesliLocalOnly.entitlements
          MUESLI_SKIP_SIGN: "1"
          MUESLI_SWIFTPM_SCRATCH_PATH: ${{ runner.temp }}/muesli-spm
        run: ./scripts/build_native_app.sh release

      - name: Verify packaged app
        shell: bash
        run: |
          APP_DIR="${{ steps.meta.outputs.app_dir }}"
          APP_EXECUTABLE="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_DIR/Contents/Info.plist")"
          APP_BIN="$APP_DIR/Contents/MacOS/$APP_EXECUTABLE"
          ENTITLEMENTS_PLIST="$RUNNER_TEMP/guesli-entitlements.plist"

          test -d "$APP_DIR"
          test -x "$APP_BIN"
          test -x "$APP_DIR/Contents/MacOS/muesli-cli"

          codesign --verify --deep --strict --verbose=2 "$APP_DIR"
          codesign -d --entitlements :- "$APP_DIR" > "$ENTITLEMENTS_PLIST"

          if /usr/libexec/PlistBuddy -c 'Print :com.apple.developer.icloud-services' "$ENTITLEMENTS_PLIST" >/dev/null 2>&1; then
            echo "ERROR: ad-hoc Guesli release must not include CloudKit entitlements." >&2
            cat "$ENTITLEMENTS_PLIST" >&2
            exit 1
          fi

          if /usr/libexec/PlistBuddy -c 'Print :com.apple.developer.icloud-container-identifiers' "$ENTITLEMENTS_PLIST" >/dev/null 2>&1; then
            echo "ERROR: ad-hoc Guesli release must not include iCloud container entitlements." >&2
            cat "$ENTITLEMENTS_PLIST" >&2
            exit 1
          fi

          "$APP_DIR/Contents/MacOS/muesli-cli" spec >/dev/null

      - name: Package app zip
        run: |
          APP_ZIP="${{ steps.meta.outputs.app_zip }}"
          mkdir -p "$(dirname "$APP_ZIP")"
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "${{ steps.meta.outputs.app_dir }}" "$APP_ZIP"

      - name: Create DMG
        run: |
          STAGING="$(mktemp -d)"
          cp -R "${{ steps.meta.outputs.app_dir }}" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "Guesli" -srcfolder "$STAGING" -ov -format UDZO "${{ steps.meta.outputs.dmg_path }}"
          rm -rf "$STAGING"

      - name: Package Meet speaker extension
        run: |
          EXTENSION_ZIP="${{ steps.meta.outputs.extension_zip }}"
          if [[ -d browser-extension/muesli-meet-speaker ]]; then
            mkdir -p "$(dirname "$EXTENSION_ZIP")"
            /usr/bin/ditto -c -k --keepParent browser-extension/muesli-meet-speaker "$EXTENSION_ZIP"
          else
            echo "Meet speaker extension is not present on this ref; skipping extension package."
          fi

      - name: Upload app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Guesli-macos
          path: |
            ${{ steps.meta.outputs.dmg_path }}
            ${{ steps.meta.outputs.app_zip }}
          compression-level: 0

      - name: Upload Meet speaker extension artifact
        if: hashFiles('browser-extension/muesli-meet-speaker/content.js') != ''
        uses: actions/upload-artifact@v4
        with:
          name: Guesli-Meet-Speaker-Bridge
          path: |
            ${{ steps.meta.outputs.extension_zip }}
          compression-level: 0

      - name: Publish GitHub release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ steps.meta.outputs.tag_name }}"
          RELEASE_TITLE="${{ steps.meta.outputs.release_title }}"
          DMG="${{ steps.meta.outputs.dmg_path }}"
          APP_ZIP="${{ steps.meta.outputs.app_zip }}"
          EXTENSION_ZIP="${{ steps.meta.outputs.extension_zip }}"
          NOTES_FILE="$(mktemp)"
          cat > "$NOTES_FILE" <<'EOF'
          ${{ steps.meta.outputs.release_notes }}
          EOF

          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            GH_ARGS=(
              "$TAG_NAME"
              --title "$RELEASE_TITLE"
              --notes-file "$NOTES_FILE"
              --target "$GITHUB_SHA"
            )
            if [[ "${{ steps.meta.outputs.prerelease }}" == "true" ]]; then
              GH_ARGS+=(--prerelease)
            fi
            gh release create "${GH_ARGS[@]}"
          fi
          ASSETS=("$DMG" "$APP_ZIP")
          if [[ -f "$EXTENSION_ZIP" ]]; then
            ASSETS+=("$EXTENSION_ZIP")
          fi
          gh release upload "$TAG_NAME" "${ASSETS[@]}" --clobber
